version: '3.8'

services:
  prompt-builder:
    image: smkgun/promptly:latest
    user: root
    container_name: prompt-builder
    ports:
      - "8080:3001"
    volumes:
      - /mnt/cyano/appdata/promptly/data:/app/data
    restart: unless-stopped
    environment:
      - PORT=3001
      - DATA_DIR=/app/data
      - NODE_ENV=production
      # ⚠️ 必须修改！不要使用默认值，用以下命令生成：
      # openssl rand -base64 32
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    deploy:
      resources:
        limits:
          memory: 512M
