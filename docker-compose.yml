version: '3.8'

services:
  prompt-builder:
    # 从 DockerHub 拉取镜像（替换为你的 DockerHub 用户名）
    image: ${DOCKERHUB_USERNAME:-yourname}/prompt-builder:latest
    container_name: prompt-builder
    ports:
      - "8080:3001"
    volumes:
      - prompt-builder-data:/app/data
    restart: unless-stopped
    environment:
      - PORT=3001
      - DATA_DIR=/app/data
      - NODE_ENV=production
      # ⚠️ 必须修改为你自己的随机密钥，用于 JWT 签名
      - JWT_SECRET=change-me-to-a-random-string
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  prompt-builder-data:
    driver: local
